<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vani Player</title>
  </head>
  <body>
    <script>
      (function () {
        var base = '/vaniplayer/';
        var path = window.location.pathname;
        if (path.indexOf(base) !== 0) {
          window.location.replace(base);
          return;
        }
        var slug = path.slice(base.length).replace(/^\/+|\/+$/g, '');
        if (!slug) {
          window.location.replace(base);
          return;
        }
        var target = base + '?p=' + encodeURIComponent(slug);
        if (window.location.search) {
          target += '&' + window.location.search.replace(/^\?/, '');
        }
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
